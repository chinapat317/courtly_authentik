services:
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTHENTIK_POSTGRESQL__NAME}
      POSTGRES_USER: ${AUTHENTIK_POSTGRESQL__USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/certs/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/certs/server.key
      - -c
      - ssl_ca_file=/var/lib/postgresql/certs/ca.crt
      - -c
      - hba_file=/var/lib/postgresql/certs/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - authentik_db:/var/lib/postgresql/data
      - ../../ca/cert/ca.crt:/var/lib/postgresql/certs/ca.crt:ro
      - ../cert/auth_db/server.crt:/var/lib/postgresql/certs/server.crt:ro
      - ../cert/auth_db/server.key:/var/lib/postgresql/certs/server.key:ro
      - ../cert/auth_db/pg_hba.conf:/var/lib/postgresql/certs/pg_hba.conf:ro
    networks:
      - authentik